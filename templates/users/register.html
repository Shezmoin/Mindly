{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register — Mindly{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card card-hover p-4">
            <h1 class="h3 mb-3 text-center">Create Your Account</h1>
            <p class="text-center mb-4">Start your wellbeing journey with mindly.</p>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-mindly">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
