{% extends 'base.html' %}

{% block title %}Profile - mindly{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card card-hover p-4">
            <h1 class="h3 mb-4">Your Profile</h1>

            <div class="row g-3">
                <div class="col-md-6">
                    <div class="p-3 calm-bg">
                        <h2 class="h6 mb-2">Username</h2>
                        <p class="mb-0">{{ user.username }}</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-3 calm-bg">
                        <h2 class="h6 mb-2">Email</h2>
                        <p class="mb-0">{{ user.email|default:'Not set' }}</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-3 calm-bg">
                        <h2 class="h6 mb-2">Bio</h2>
                        <p class="mb-0">{{ user.bio|default:'No bio yet' }}</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-3 calm-bg">
                        <h2 class="h6 mb-2">Joined</h2>
                        <p class="mb-0">{{ user.date_joined|date:'F j, Y' }}</p>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <a href="{% url 'users:logout' %}" class="btn btn-outline-secondary">Log Out</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
