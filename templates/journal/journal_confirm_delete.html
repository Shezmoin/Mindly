{% extends 'base.html' %}

{% block title %}Delete Journal Entry — Mindly{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card card-hover p-4 border border-danger-subtle">
            <h1 class="h3 mb-3 text-danger">Delete Journal Entry</h1>
            <p class="mb-2">Are you sure you want to delete this entry?</p>
            <p class="mb-4"><strong>{{ entry.title }}</strong></p>
            <div class="alert alert-warning" role="alert">
                This action cannot be undone.
            </div>

            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <a href="{% url 'journal:journal-list' %}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
